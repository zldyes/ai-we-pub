name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: ai-we-pub.exe
            webview2: download
          - os: ubuntu-latest
            platform: linux/amd64
            output: ai-we-pub
            webview2: ""
          - os: macos-latest
            platform: darwin/universal
            output: ai-we-pub
            webview2: ""
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          WEBVIEW2_FLAG="${{ matrix.webview2 }}"
          if [ -n "$WEBVIEW2_FLAG" ]; then
            wails build --platform ${{ matrix.platform }} -o ${{ matrix.output }} -webview2 "$WEBVIEW2_FLAG"
          else
            wails build --platform ${{ matrix.platform }} -o ${{ matrix.output }}
          fi
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: ai-we-pub-${{ matrix.os }}
          path: build/bin/**
