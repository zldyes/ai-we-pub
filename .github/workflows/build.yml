name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            output: ai-we-pub.exe
            webview2: download
            archive: zip
          - os: ubuntu-latest
            platform: linux/amd64
            output: ai-we-pub
            webview2: ""
            tags: webkit2_41
            archive: tar.gz
          - os: macos-latest
            platform: darwin/universal
            output: ai-we-pub
            webview2: ""
            archive: tar.gz
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: |
          ARGS="--platform ${{ matrix.platform }} -o ${{ matrix.output }}"
          if [ -n "${{ matrix.webview2 }}" ]; then
            ARGS="$ARGS -webview2 ${{ matrix.webview2 }}"
          fi
          if [ -n "${{ matrix.tags }}" ]; then
            ARGS="$ARGS -tags ${{ matrix.tags }}"
          fi
          wails build $ARGS
        shell: bash

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path build/bin/${{ matrix.output }} -DestinationPath ai-we-pub-windows-amd64.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          tar czf ai-we-pub-linux-amd64.tar.gz -C build/bin ${{ matrix.output }}

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          tar czf ../../ai-we-pub-darwin-universal.tar.gz ai-we-pub.app

      - uses: actions/upload-artifact@v4
        with:
          name: ai-we-pub-${{ matrix.os }}
          path: ai-we-pub-*.zip
          if-no-files-found: ignore

      - uses: actions/upload-artifact@v4
        with:
          name: ai-we-pub-${{ matrix.os }}
          path: ai-we-pub-*.tar.gz
          if-no-files-found: ignore

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ai-we-pub-*
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-we-pub-windows-amd64.zip
            ai-we-pub-linux-amd64.tar.gz
            ai-we-pub-darwin-universal.tar.gz
          generate_release_notes: true
